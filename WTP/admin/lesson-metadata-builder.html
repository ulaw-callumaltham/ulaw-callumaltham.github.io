<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson Metadata Builder | CS WTP Admin</title>
    <link rel="icon" type="image/svg+xml" href="../assets/icons/ulaw-logo.svg">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 30px;
        }

        .header {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e5e7eb;
        }

        h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
        }

        .section {
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 2px solid #8b5cf6;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: 500;
            margin-bottom: 5px;
            color: #333;
            font-size: 14px;
        }

        input[type="text"],
        input[type="number"],
        textarea,
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            font-family: inherit;
        }

        input:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #8b5cf6;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .lesson-card {
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            background: #fafafa;
        }

        .lesson-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #e5e7eb;
        }

        .lesson-number {
            font-size: 18px;
            font-weight: 600;
            color: #8b5cf6;
        }

        .checkbox-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .checkbox-item input[type="checkbox"] {
            width: auto;
            margin: 0;
        }

        .hints-container {
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 15px;
            background: white;
            margin-bottom: 10px;
        }

        .hint-item {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            align-items: center;
        }

        .hint-item input {
            flex: 1;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: #8b5cf6;
            color: white;
        }

        .btn-primary:hover {
            background: #7c3aed;
        }

        .btn-secondary {
            background: #6b7280;
            color: white;
        }

        .btn-secondary:hover {
            background: #4b5563;
        }

        .btn-success {
            background: #10b981;
            color: white;
        }

        .btn-success:hover {
            background: #059669;
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 13px;
        }

        .actions {
            display: flex;
            gap: 10px;
            padding-top: 20px;
            border-top: 2px solid #e5e7eb;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="index.html" class="back-link">← Back to Dashboard</a>
            <h1>Lesson Metadata Builder</h1>
            <p class="subtitle">Create multiple lesson entries and generate lessons.json</p>
        </div>
        
        <!-- Unit Info -->
        <div class="section">
            <h2 class="section-title">Unit Information</h2>
            <div class="grid-3">
                <div class="form-group">
                    <label for="moduleId">Module ID *</label>
                    <input type="text" id="moduleId" placeholder="e.g., CSCI71585">
                </div>
                <div class="form-group">
                    <label for="unitNumber">Unit Number *</label>
                    <input type="number" id="unitNumber" min="1" placeholder="1">
                </div>
                <div class="form-group">
                    <label for="unitTitle">Unit Title *</label>
                    <input type="text" id="unitTitle" placeholder="e.g., HTML 101">
                </div>
            </div>
        </div>
        
        <!-- Lessons List -->
        <div class="section">
            <h2 class="section-title">Lessons</h2>
            <div id="lessonsList">
                <!-- Lessons will be added here -->
            </div>
            <button class="btn btn-secondary" id="addLessonBtn">+ Add Lesson</button>
        </div>
        
        <!-- Actions -->
        <div class="actions">
            <button class="btn btn-success" id="downloadBtn">Download lessons.json</button>
            <button class="btn btn-danger" id="clearBtn">Clear All</button>
        </div>
    </div>
    
    <script src="lesson-metadata-builder.js"></script>
</body>
</html>
