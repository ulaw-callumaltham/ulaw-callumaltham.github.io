<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content Management | CS WTP Admin</title>
    <link rel="icon" type="image/svg+xml" href="../assets/icons/ulaw-logo.svg">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 30px;
        }

        .header {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e5e7eb;
        }

        h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
        }

        .section {
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 2px solid #8b5cf6;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-card.warning {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
        }

        .stat-card.error {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
        }

        .stat-value {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 14px;
            opacity: 0.9;
        }

        /* Module Cards */
        .module-card {
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .module-header {
            background: #f9fafb;
            padding: 15px 20px;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: background 0.2s;
        }

        .module-header:hover {
            background: #f3f4f6;
        }

        .module-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }

        .module-meta {
            color: #666;
            font-size: 14px;
        }

        .module-content {
            padding: 20px;
        }

        /* Unit Cards */
        .unit-card {
            margin-bottom: 20px;
            padding-left: 20px;
            border-left: 3px solid #8b5cf6;
        }

        .unit-header {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
        }

        /* Lesson List */
        .lesson-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .lesson-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: #fafafa;
            border-radius: 6px;
            border-left: 3px solid transparent;
        }

        .lesson-item.complete {
            border-left-color: #10b981;
        }

        .lesson-item.warning {
            border-left-color: #f59e0b;
            background: #fffbeb;
        }

        .lesson-item.error {
            border-left-color: #ef4444;
            background: #fef2f2;
        }

        .lesson-status {
            font-size: 18px;
            min-width: 24px;
            text-align: center;
        }

        .lesson-info {
            flex: 1;
        }

        .lesson-title {
            font-weight: 500;
            color: #333;
            margin-bottom: 4px;
        }

        .lesson-details {
            font-size: 13px;
            color: #666;
        }

        .lesson-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }

        .badge-web {
            background: #dbeafe;
            color: #1e40af;
        }

        .badge-python {
            background: #dcfce7;
            color: #166534;
        }

        .lesson-issues {
            font-size: 13px;
            color: #dc2626;
            margin-top: 4px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        /* Actions */
        .actions {
            display: flex;
            gap: 10px;
            padding-top: 20px;
            border-top: 2px solid #e5e7eb;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-secondary {
            background: #6b7280;
            color: white;
        }

        .btn-secondary:hover {
            background: #4b5563;
        }

        .toggle-icon {
            transition: transform 0.2s;
        }

        .toggle-icon.collapsed {
            transform: rotate(-90deg);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Content Management Dashboard</h1>
            <p class="subtitle">Overview and validation of all course content</p>
        </div>
        
        <!-- Stats Overview -->
        <div class="stats-grid" id="statsGrid">
            <!-- Stats will be inserted here -->
        </div>
        
        <!-- Content Inventory -->
        <div class="section">
            <h2 class="section-title">Content Inventory</h2>
            <div id="contentInventory">
                <div class="loading">Loading content...</div>
            </div>
        </div>
        
        <!-- Actions -->
        <div class="actions">
            <a href="index.html" class="btn btn-secondary">← Back to Admin</a>
        </div>
    </div>
    
    <script src="content-management.js"></script>
</body>
</html>
